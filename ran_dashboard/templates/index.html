<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>RAN Control Dashboard</title>
    <style>
    body {
        font-family: Arial;
        margin: 40px;
        background-color: #1e1e2f;
        color: #ffffff;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    .service {
        background: #2c2c3e;
        border-radius: 10px;
        padding: 15px;
        margin: 10px 0;
        width: 320px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .running {
        color: #00ff9c;
        font-weight: bold;
    }

    .stopped {
        color: #ff4d4d;
        font-weight: bold;
    }

    button {
    margin: 5px;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    }

    /*Start button */
    .start-btn {
        background-color: #4CAF50;
        color: white;
    }

    /* Stop button */
    .stop-btn {
        background-color: #e74c3c;
        color: white;
    }

    button:hover {
        opacity: 0.85;
    }
    .stop-all {
        background-color: #ff0000;
        color: white;
        font-weight: bold;
        margin-bottom: 20px;
        padding: 8px 16px;
        border-radius: 6px;
    }
    .services-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    #metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    #radio_metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    </style>

</head>
<body>

<h1>🚀 sRAN Dashboard</h1>

<button class="stop-all" onclick="stopAll()">🛑 STOP ALL</button>
<h2>⚙️ Test Mode Control</h2>

<div class="service">
    <label>Number of UEs:</label>
    <input type="number" id="ue_count" value="5"><br><br>

    <label>Rank (RI):</label>
    <input type="number" id="ri_value" value="1"><br><br>

    <button class="start-btn" onclick="applyConfig()">Apply & Restart gNB</button>
</div>

<div id="services" class="services-container"></div>
<h2>📊 UE Throughput </h2>
<canvas id="chart" height="100"></canvas>
<h2>📡 UE Radio Metrics</h2>
<div id="radio_metrics"></div>
<h2>📊 Cell Throughput</h2>
<canvas id="cellChart" height="100"></canvas>
<h2>⚖️ Fairness Index</h2>
<canvas id="fairnessChart" height="100"></canvas>
<h3 id="status_msg"></h3>

<script>
let chart, cellChart, fairnessChart;
let chartData = {
    labels: [],
    datasets: []
};
let cellData = { labels: [], datasets: [{ label: "Cell Throughput", data: [],
        borderColor: "red", backgroundColor: "red", borderWidth: 2, fill: false }] };
let fairnessData = { labels: [], datasets: [{ label: "Fairness", data: [],
        borderColor: "yellow", backgroundColor: "yellow", borderWidth: 2, fill: false }] };
const services = ["open5gs", "ric", "gnb", "xapp"];

function render(statusData) {
    const container = document.getElementById("services");
    container.innerHTML = "";

    services.forEach(name => {
        const state = statusData[name];
        const colorClass = state === "running" ? "running" : "stopped";

        container.innerHTML += `
            <div class="service">
                <h3>${name.toUpperCase()}</h3>
                Status: <span class="${colorClass}">${state}</span><br>

                <button class="start-btn" onclick="start('${name}')"${state === "running" ? "disabled" : ""}>Start</button>

                <button class="stop-btn" onclick="stop('${name}')"${state === "stopped" ? "disabled" : ""}>Stop</button>
            </div>
        `;

    });
}

function fetchStatus() {
    fetch('/status')
    .then(res => res.json())
    .then(data => render(data));
}

function start(name) {
    fetch(`/start/${name}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg;
        render(data.status);
    });
}

function stop(name) {
    fetch(`/stop/${name}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = Array.isArray(data.msg) ? data.msg.join("\n") : data.msg;
        render(data.status);
    });
}

function stopAll() {
    fetch('/stop_all')
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg.join("\n");
        render(data.status);
    });
}
//Mofidying configs from interface
function applyConfig() {
    const ue = document.getElementById("ue_count").value;
    const ri = document.getElementById("ri_value").value;

    fetch('/update_config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nof_ues: ue, ri: ri })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg;
    });
}



// chart functions

function fetchMetrics() {
    fetch('/status')
    .then(res => res.json())
    .then(status => {

        // If gNB is OFF we clear everything
        if (status.gnb !== "running") {
            resetChart();
            clearRadioMetrics();
            return;
        }
        fetch('/metrics')
        .then(res => res.json())
        .then(data => {
            // 🔥 FIX: use data.ues instead of data
            if (data.ues.length === 0) {
                resetChart();
                clearRadioMetrics();
                return;
            }

            updateChart(data.ues);
            updateRadioMetrics(data.ues);
            updateCellMetrics(data);
        });
    });
}


function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',
        data: chartData,
        options: {
            responsive: true,
            animation: false,
            scales: {
                x: {
                    title: { display: true, text: 'Time' }
                },
                y: {
                    title: { display: true, text: 'Throughput (Mbps)' }
                }
            }
        }
    });
}

function updateChart(data) {
     // remove "stopped" message when data comes back
    chart.options.plugins = {
        title: {
            display: false
       }
    };
    const now = new Date().toLocaleTimeString();

    chartData.labels.push(now);

    if (chartData.labels.length > 20) {
        chartData.labels.shift();
        chartData.datasets.forEach(ds => ds.data.shift());
    }

    let allValues = [];

    data.forEach(ue => {
        let dataset = chartData.datasets.find(d => d.label === "UE " + ue.rnti);

        if (!dataset) {
            dataset = {
                label: "UE " + ue.rnti,
                data: [],
                borderWidth: 2,
                fill: false
            };
            chartData.datasets.push(dataset);
        }

        dataset.data.push(ue.throughput);
        allValues.push(ue.throughput);
    });

    // Dynamic scaling
    if (allValues.length > 0) {
        const min = Math.min(...allValues);
        const max = Math.max(...allValues);

        chart.options.scales.y.min = 0.0;
        chart.options.scales.y.max = max * 1.95;
    }

    chart.update();
}

//resetting our chart
function resetChart() {
    chartData.labels = [];
    chartData.datasets = [];

    cellData.labels = [];
    cellData.datasets[0].data = [];

    fairnessData.labels = [];
    fairnessData.datasets[0].data = [];

    chart.options.scales.y.min = undefined;
    chart.options.scales.y.max = undefined;

    chart.options.plugins = {
        title: {
            display: true,
            text: "gNB stopped — no data"
        }
    };

    chart.update();
    cellChart.update();
    fairnessChart.update();
}


function updateRadioMetrics(data) {
    const container = document.getElementById("radio_metrics");

    if (data.length === 0) {
        container.innerHTML = "<p>No active UEs</p>";
        return;
    }

    container.innerHTML = "";

    data.forEach(ue => {
        container.innerHTML += `
            <div class="service">
                <h3>📡 UE ${ue.rnti}</h3>
                <p>CQI: <b>${ue.cqi}</b></p>
                <p>RI: <b>${ue.ri}</b></p>
                <p>MCS: <b>${ue.mcs}</b></p>
            </div>
        `;
    });
}


function clearRadioMetrics() {
    document.getElementById("radio_metrics").innerHTML = "<p>gNB stopped</p>";
}

initChart();
initExtraCharts();
fetchStatus();
fetchMetrics();

setInterval(() => {
    fetchStatus();
    fetchMetrics();
}, 3000);

function initExtraCharts() {
    const ctx1 = document.getElementById('cellChart').getContext('2d');
    const ctx2 = document.getElementById('fairnessChart').getContext('2d');

    cellChart = new Chart(ctx1, {
    type: 'line',
    data: cellData,
    options: {
        animation: false,
        scales: {
            y: {
                min: 30,
                max: 60,
                ticks: {
                    color: "#aaa"
                },
                grid: {
                    color: "#444"
                }
            },
            x: {
                ticks: {
                    color: "#aaa"
                },
                grid: {
                    color: "#444"
                }
            }
        }
    }
    });

    fairnessChart = new Chart(ctx2, {
    type: 'line',
    data: fairnessData,
    options: {
        animation: false,
        scales: {
            y: {
                min: 0,
                max: 1,
                ticks: {
                    color: "#aaa"
                },
                grid: {
                    color: "#444"
                }
            },
            x: {
                ticks: {
                    color: "#aaa"
                },
                grid: {
                    color: "#444"
                }
            }
        }
    }
    });
}
function updateCellMetrics(data) {
    const now = new Date().toLocaleTimeString();

    // limit history
    if (cellData.labels.length > 20) {
        cellData.labels.shift();
        cellData.datasets[0].data.shift();
        fairnessData.labels.shift();
        fairnessData.datasets[0].data.shift();
    }

    cellData.labels.push(now);
    fairnessData.labels.push(now);

    cellData.datasets[0].data.push(data.cell_throughput);
    fairnessData.datasets[0].data.push(data.fairness);

    cellChart.update();
    fairnessChart.update();
}

</script>

</body>
</html>
