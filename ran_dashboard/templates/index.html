<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>RAN Control Dashboard</title>
    <style>
    body {
        font-family: Arial;
        margin: 40px;
        background-color: #1e1e2f;
        color: #ffffff;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    .service {
        background: #2c2c3e;
        border-radius: 10px;
        padding: 15px;
        margin: 10px 0;
        width: 320px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .running {
        color: #00ff9c;
        font-weight: bold;
    }

    .stopped {
        color: #ff4d4d;
        font-weight: bold;
    }

    button {
    margin: 5px;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    }

    /*Start button */
    .start-btn {
        background-color: #4CAF50;
        color: white;
    }

    /* Stop button */
    .stop-btn {
        background-color: #e74c3c;
        color: white;
    }

    button:hover {
        opacity: 0.85;
    }
    .stop-all {
        background-color: #ff0000;
        color: white;
        font-weight: bold;
        margin-bottom: 20px;
        padding: 8px 16px;
        border-radius: 6px;
    }
    .services-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    #metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    #radio_metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    #fairness_alerts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
    }

    .fairness-alert-card {
        background: #2c2c3e;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .fairness-balanced {
        border-left: 6px solid #00ff9c;
    }

    .fairness-imbalance {
        border-left: 6px solid #ffb347;
    }

    .fairness-strong {
        border-left: 6px solid #ff4d4d;
    }

    .alert-time {
        font-size: 0.9em;
        color: #cfcfcf;
        margin-bottom: 6px;
    }

    </style>

</head>
<body>

<h1>🚀 sRAN Dashboard</h1>

<button class="stop-all" onclick="stopAll()">🛑 STOP ALL</button>
<h2>⚙️ Test Mode Control</h2>

<div class="service">
    <label>Number of UEs:</label>
    <input type="number" id="ue_count" value="5"><br><br>

    <label>Rank (RI):</label>
    <input type="number" id="ri_value" value="1"><br><br>

    <button class="start-btn" onclick="applyConfig()">Apply & Restart gNB</button>
</div>

<div id="services" class="services-container"></div>
<h2>📊 UE Throughput (Live)</h2>
<canvas id="chart" height="100"></canvas>
<h2>📡 UE Radio Metrics</h2>
<div id="radio_metrics"></div>

<h2>⚠️ Fairness Alerts</h2>
<div id="fairness_alerts"></div>

<h3 id="status_msg"></h3>
<script>
let chart;
let chartData = {
    labels: [],
    datasets: []
};

const services = ["open5gs", "ric", "gnb", "xapp"];

function render(statusData) {
    const container = document.getElementById("services");
    container.innerHTML = "";

    services.forEach(name => {
        const state = statusData[name];
        const colorClass = state === "running" ? "running" : "stopped";

        container.innerHTML += `
            <div class="service">
                <h3>${name.toUpperCase()}</h3>
                Status: <span class="${colorClass}">${state}</span><br>

                <button class="start-btn" onclick="start('${name}')"${state === "running" ? "disabled" : ""}>Start</button>

                <button class="stop-btn" onclick="stop('${name}')"${state === "stopped" ? "disabled" : ""}>Stop</button>
            </div>
        `;

    });
}

function fetchStatus() {
    fetch('/status')
    .then(res => res.json())
    .then(data => render(data));
}

function start(name) {
    fetch(`/start/${name}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg;
        render(data.status);
    });
}

function stop(name) {
    fetch(`/stop/${name}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = Array.isArray(data.msg) ? data.msg.join("\n") : data.msg;
        render(data.status);
    });
}

function stopAll() {
    fetch('/stop_all')
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg.join("\n");
        render(data.status);
    });
}
//Mofidying configs from interface
function applyConfig() {
    const ue = document.getElementById("ue_count").value;
    const ri = document.getElementById("ri_value").value;

    fetch('/update_config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nof_ues: ue, ri: ri })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status_msg").innerText = data.msg;
    });
}

let fairnessAlertHistory = [];
let lastFairnessSignature = null;
const MAX_FAIRNESS_ALERTS = 6;

function fetchFairnessAlert() {
    fetch('/fairness_alert')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("fairness_alerts");
        const status = data.status || "UNKNOWN";

        // Only store alerts when there is IMBALANCE or STRONG_IMBALANCE
        if (status !== "IMBALANCE" && status !== "STRONG_IMBALANCE") {
            return;
        }

        // Create a signature so identical repeated alerts are not re-added every poll
        const signature = JSON.stringify({
            status: data.status,
            action: data.action,
            target_ue: data.target_ue,
            weakest_norm_ue: data.weakest_norm_ue,
            strongest_norm_ue: data.strongest_norm_ue,
            norm_jain: data.norm_jain,
            delta: data.delta
        });

        if (signature === lastFairnessSignature) {
            return;
        }

        lastFairnessSignature = signature;

        const now = new Date().toLocaleTimeString();

        fairnessAlertHistory.unshift({
            time: now,
            status: data.status,
            action: data.action,
            target_ue: data.target_ue,
            raw_jain: data.raw_jain,
            norm_jain: data.norm_jain,
            rolling_mu: data.rolling_mu,
            delta: data.delta,
            weakest_raw_ue: data.weakest_raw_ue,
            strongest_raw_ue: data.strongest_raw_ue,
            weakest_norm_ue: data.weakest_norm_ue,
            strongest_norm_ue: data.strongest_norm_ue
        });

        if (fairnessAlertHistory.length > MAX_FAIRNESS_ALERTS) {
            fairnessAlertHistory = fairnessAlertHistory.slice(0, MAX_FAIRNESS_ALERTS);
        }

        renderFairnessAlerts();
    })
    .catch(err => {
        console.error("Fairness fetch error:", err);
    });
}

function renderFairnessAlerts() {
    const container = document.getElementById("fairness_alerts");

    if (fairnessAlertHistory.length === 0) {
        container.innerHTML = "<div class='service'>No imbalance alerts yet.</div>";
        return;
    }

    container.innerHTML = "";

    fairnessAlertHistory.forEach(alert => {
        let alertClass = "fairness-imbalance";
        if (alert.status === "STRONG_IMBALANCE") {
            alertClass = "fairness-strong";
        }

        container.innerHTML += `
            <div class="fairness-alert-card ${alertClass}">
                <div class="alert-time">Detected at: ${alert.time}</div>
                <h3>${alert.status}</h3>
                <p><b>Action:</b> ${alert.action || "N/A"}</p>
                <p><b>Target UE:</b> ${alert.target_ue !== null ? alert.target_ue : "N/A"}</p>
                <p><b>Raw Jain:</b> ${alert.raw_jain !== null ? alert.raw_jain.toFixed(6) : "N/A"}</p>
                <p><b>Normalized Jain:</b> ${alert.norm_jain !== null ? alert.norm_jain.toFixed(6) : "N/A"}</p>
                <p><b>Rolling Mean:</b> ${alert.rolling_mu !== null ? alert.rolling_mu.toFixed(6) : "N/A"}</p>
                <p><b>Delta:</b> ${alert.delta !== null ? alert.delta.toFixed(6) : "N/A"}</p>
                <p><b>Weakest Raw UE:</b> ${alert.weakest_raw_ue !== null ? alert.weakest_raw_ue : "N/A"}</p>
                <p><b>Strongest Raw UE:</b> ${alert.strongest_raw_ue !== null ? alert.strongest_raw_ue : "N/A"}</p>
                <p><b>Weakest Norm UE:</b> ${alert.weakest_norm_ue !== null ? alert.weakest_norm_ue : "N/A"}</p>
                <p><b>Strongest Norm UE:</b> ${alert.strongest_norm_ue !== null ? alert.strongest_norm_ue : "N/A"}</p>
            </div>
        `;
    });
}



// chart functions

function fetchMetrics() {
    fetch('/status')
    .then(res => res.json())
    .then(status => {

        // If gNB is OFF we clear everything
        if (status.gnb !== "running") {
            resetChart();
            clearRadioMetrics();
            return;
        }

        // otherwise fetch metrics
        fetch('/metrics')
        .then(res => res.json())
        .then(data => {
            updateChart(data);
            updateRadioMetrics(data);
        });
    });
}


function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',
        data: chartData,
        options: {
            responsive: true,
            animation: false,
            scales: {
                x: {
                    title: { display: true, text: 'Time' }
                },
                y: {
                    title: { display: true, text: 'Throughput (Mbps)' }
                }
            }
        }
    });
}

function updateChart(data) {
    const now = new Date().toLocaleTimeString();

    chartData.labels.push(now);

    if (chartData.labels.length > 20) {
        chartData.labels.shift();
        chartData.datasets.forEach(ds => ds.data.shift());
    }

    let allValues = [];

    data.forEach(ue => {
        let dataset = chartData.datasets.find(d => d.label === "UE " + ue.rnti);

        if (!dataset) {
            dataset = {
                label: "UE " + ue.rnti,
                data: [],
                borderWidth: 2,
                fill: false
            };
            chartData.datasets.push(dataset);
        }

        dataset.data.push(ue.throughput);
        allValues.push(ue.throughput);
    });

    // Dynamic scaling
    if (allValues.length > 0) {
        const min = Math.min(...allValues);
        const max = Math.max(...allValues);

        chart.options.scales.y.min = min * 0.3;
        chart.options.scales.y.max = max * 1.1;
    }

    chart.update();
}

//resetting our chart
function resetChart() {
    chartData.labels = [];
    chartData.datasets = [];

    chart.options.scales.y.min = undefined;
    chart.options.scales.y.max = undefined;
    chart.options.plugins = {
        title: {
            display: true,
            text: "gNB stopped — no data"
        }
    };

    chart.update();
}


function updateRadioMetrics(data) {
    const container = document.getElementById("radio_metrics");

    if (data.length === 0) {
        container.innerHTML = "<p>No active UEs</p>";
        return;
    }

    container.innerHTML = "";

    data.forEach(ue => {
        container.innerHTML += `
            <div class="service">
                <h3>📡 UE ${ue.rnti}</h3>
                <p>CQI: <b>${ue.cqi}</b></p>
                <p>RI: <b>${ue.ri}</b></p>
                <p>MCS: <b>${ue.mcs}</b></p>
            </div>
        `;
    });
}


function clearRadioMetrics() {
    document.getElementById("radio_metrics").innerHTML = "<p>gNB stopped</p>";
}


initChart();
fetchStatus();
fetchMetrics();
fetchFairnessAlert();

setInterval(() => {
    fetchStatus();
    fetchMetrics();
    fetchFairnessAlert();
}, 3000);

</script>

</body>
</html>
